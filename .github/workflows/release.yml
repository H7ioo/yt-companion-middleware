name: Release

# Cuts a GitHub Release with the Windows desktop app (installer + portable) and the Companion
# module package attached. Push a version tag to release; the workflow can also be run manually
# from the Actions tab to build the artifacts without publishing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: Windows desktop app
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Full install so electron + electron-builder + the win32 @napi-rs/canvas binary are present.
      - run: npm ci

      # The dashboard is a separate package; build:web (tsc -b + vite build) needs its own deps.
      - run: npm ci
        working-directory: web

      # Stamp the desktop app version from the release tag so the installer/exe are named for the
      # release (e.g. tag v2.1.0 -> "YT Companion Setup 2.1.0.exe"). Not committed — it only
      # affects this build. The Companion module keeps its own in-repo version (see VERSIONING.md).
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      # Generates icons, builds server + web, then packs the NSIS installer and portable .exe.
      # No GH token is exposed here on purpose: electron-builder must not auto-publish — the
      # release job downloads these artifacts and owns publishing.
      - run: npm run desktop:build

      - uses: actions/upload-artifact@v4
        with:
          name: desktop
          # Installer + portable exe. Skip the auto-update sidecars (latest.yml / *.blockmap).
          path: release/*.exe
          if-no-files-found: error

  companion:
    name: Companion module package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: companion-module/package-lock.json

      - run: npm ci
        working-directory: companion-module

      # prepackage re-checks that package.json and manifest.json versions match before building.
      - run: npm run package
        working-directory: companion-module

      - uses: actions/upload-artifact@v4
        with:
          name: companion
          path: companion-module/*.tgz
          if-no-files-found: error

  release:
    name: Publish release
    needs: [desktop, companion]
    runs-on: ubuntu-latest
    # Only publish for tag pushes; a manual run just leaves the artifacts on the workflow run.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/desktop/*.exe
            artifacts/companion/*.tgz
          generate_release_notes: true
          fail_on_unmatched_files: true

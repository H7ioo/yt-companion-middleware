name: Release

# Cuts a GitHub Release with the Windows desktop app (installer + portable) and the Companion
# module package attached. Push a version tag to release; the workflow can also be run manually
# from the Actions tab to build the artifacts without publishing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Gate the release on the checks that don't need Windows: types, the full test suite (unit +
  # route integration), and the release smoke test — boot the BUILT server and probe health, so a
  # "compiles but won't boot" build is caught here and not by an operator (PRD-05 §1.3, §2.2).
  checks:
    name: Typecheck, tests, smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      # companion-module is not an npm workspace, but root typecheck covers its checkJs (issue
      # 028) and needs @companion-module/base resolvable — install its deps too.
      - run: npm ci
        working-directory: companion-module
      - run: npm run typecheck
      - run: npm run typecheck:electron
      - run: npm test
      - run: npm run build:all
      - run: npm run smoke

  desktop:
    name: Windows desktop app
    needs: checks
    runs-on: windows-latest
    steps:
      # Full history + tags: desktop:build regenerates CHANGELOG.md and bundles it into the app
      # (PRD-09 §B.2). A shallow clone has no tags, so the bundled changelog would come out empty.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Full install so electron + electron-builder (packages/desktop devDeps) and the win32
      # @napi-rs/canvas binary (packages/server dep) are present. npm workspaces install every
      # package (packages/{shared,server,web,desktop}) from the root lockfile.
      - run: npm ci

      # Stamp the desktop app version from the release tag so the installer/exe are named for the
      # release (e.g. tag v2.1.0 -> "YT Companion Setup 2.1.0.exe"). Bumps the ROOT package.json —
      # electron-builder's app dir is the workspace root, so it reads the version from there. Not
      # committed — it only affects this build. The Companion module keeps its own in-repo version.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      # Type-checks the Electron entry, generates icons, builds shared+web+server, then packs the
      # NSIS installer and portable .exe from packages/desktop/electron-builder.yml. --publish never:
      # electron-builder's default (onTagOrDraft) would otherwise try to upload on tag builds and
      # fail for want of GH_TOKEN. The release job downloads these artifacts and owns publishing.
      # Bundled OAuth client (issue 011). Injected from repo secrets into the gitignored generated
      # constant the shipped binary carries — never committed. Absent secrets => empty constants and
      # an override-only build (e.g. on forks), which still packs fine.
      - run: npm run desktop:build
        env:
          YT_BUNDLED_CLIENT_ID: ${{ secrets.YT_BUNDLED_CLIENT_ID }}
          YT_BUNDLED_CLIENT_SECRET: ${{ secrets.YT_BUNDLED_CLIENT_SECRET }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop
          # Installer + portable exe, plus the auto-update sidecars electron-updater reads from the
          # Release: latest.yml (the feed) and the installer's blockmap (differential download).
          # Without these attached, auto-update cannot work at all (PRD-09 §A.0).
          path: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
          if-no-files-found: error

  companion:
    name: Companion module package
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: companion-module/package-lock.json

      - run: npm ci
        working-directory: companion-module

      # prepackage re-checks that package.json and manifest.json versions match before building.
      - run: npm run package
        working-directory: companion-module

      - uses: actions/upload-artifact@v4
        with:
          name: companion
          path: companion-module/*.tgz
          if-no-files-found: error

  release:
    name: Publish release
    needs: [desktop, companion]
    runs-on: ubuntu-latest
    # Only publish for tag pushes; a manual run just leaves the artifacts on the workflow run.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      # Checkout BEFORE downloading artifacts: checkout's default `git clean -ffdx` deletes any
      # untracked files already in the workspace, so the reverse order silently wipes artifacts/
      # and the publish step finds nothing to attach.
      # Full history + tags: the changelog is generated from the Conventional Commit range between
      # the previous tag and this one, so a shallow clone would produce empty notes (issue 039).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # One source for both surfaces: this writes CHANGELOG.md (bundled into the app) and the
      # Release body from the same render, so GitHub and the in-app changelog cannot disagree.
      - name: Generate changelog + release notes
        run: node scripts/changelog.mjs --version "${GITHUB_REF_NAME#v}" --notes-out release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            artifacts/desktop/*.exe
            artifacts/desktop/latest.yml
            artifacts/desktop/*.blockmap
            artifacts/companion/*.tgz
          # Notes come from body_path (the generated changelog section), not GitHub's commit dump —
          # the two would otherwise say different things about the same release (PRD-09 §B.1).
          generate_release_notes: false
          fail_on_unmatched_files: true
          # Semver pre-release tags (v2.1.1-rc.1, v2.2.0-beta.2 — anything with a hyphen) publish as
          # a pre-release so they don't claim "Latest" over a real release. Stable tags stay latest.
          prerelease: ${{ contains(github.ref_name, '-') }}
